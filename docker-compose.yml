version: "3.9"

services:
  api:
    build: .
    container_name: fintech-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_TOKEN=${API_TOKEN:-secret-token-fintech}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin-token-fintech}
    volumes:
      - ./database.db:/app/database.db
      - ./backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
